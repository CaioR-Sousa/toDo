<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>To Do List</title>
</head>

<body>
    <div class="container mt-4">

        <h1 class="text-center mb-4">To Do List</h1>
           <div class="pesquisa">
                <span>🔍</span>
                <input type="search" id="inBuscar" placeholder="Pesquisar tarefa...">
            </div>

        <form class="mb-4">
            <input type="text" id="inTarefa" class="form-control" placeholder="Digite uma tarefa..." required autofocus>

            <button type="submit" id="btAdicionar" class="btn btn-primary mt-3">
                Adicionar
            </button>

             <button type="button" id="btCancelar" class="btn btn-primary mt-3">
                Cancelar
            </button>
        </form>

        <div class="quadro">

            <div class="coluna">
                <h2>A Fazer</h2>
                <div id="todo"></div>
            </div>

            <div class="coluna">
                <h2>Em andamento</h2>
                <div id="doing"></div>
            </div>

            <div class="coluna">
                <h2>Concluído</h2>
                <div id="done"></div>
            </div>

        </div>

    </div>

    <script src="todo.js"></script>
</body>

</html>
